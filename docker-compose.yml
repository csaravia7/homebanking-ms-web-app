version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: homebanking_postgres
    environment:
      POSTGRES_USER: homebank
      POSTGRES_PASSWORD: secure123
      POSTGRES_DB: homebanking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homebanking_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homebank"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: homebanking_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - homebanking_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (para caching)
  redis:
    image: redis:7-alpine
    container_name: homebanking_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - homebanking_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: homebanking_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "9411:9411"   # Zipkin receiver
      - "14250:14250" # Jaeger gRPC
      - "14268:14268" # Jaeger HTTP
    volumes:
      - ./otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    networks:
      - homebanking_network
    depends_on:
      - jaeger
      - prometheus

  # Jaeger for Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: homebanking_jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    networks:
      - homebanking_network
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # Prometheus for Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: homebanking_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./otel-collector/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - homebanking_network

  # Grafana for Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: homebanking_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - homebanking_network
    depends_on:
      - prometheus

  # API Gateway (Node.js)
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: homebanking_api_gateway
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:3001
      - ACCOUNT_SERVICE_URL=http://account-service:3003
      - TRANSACTION_SERVICE_URL=http://transaction-service:3004
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=api-gateway
    depends_on:
      - otel-collector
      - auth-service
      - account-service
      - transaction-service
    networks:
      - homebanking_network
    restart: unless-stopped

  # Auth Service (Node.js)
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: homebanking_auth_service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=your-super-secret-jwt-key-change-this
      - DATABASE_URL=postgresql://homebank:secure123@postgres:5432/homebanking_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=auth-service
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - homebanking_network
    restart: unless-stopped

  # Account Service (Python)
  account-service:
    build:
      context: ./services/account-service
      dockerfile: Dockerfile
    container_name: homebanking_account_service
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgresql://homebank:secure123@postgres:5432/homebanking_db
      - PORT=3003
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=account-service
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - homebanking_network
    restart: unless-stopped

  # Transaction Service (Java)
  transaction-service:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: homebanking_transaction_service
    ports:
      - "3004:3004"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/homebanking_db
      - SPRING_DATASOURCE_USERNAME=homebank
      - SPRING_DATASOURCE_PASSWORD=secure123
      - SERVER_PORT=3004
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=transaction-service
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - homebanking_network
    restart: unless-stopped

  # Notification Service (Python)
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: homebanking_notification_service
    ports:
      - "3005:3005"
    environment:
      - DATABASE_URL=postgresql://homebank:secure123@postgres:5432/homebanking_db
      - PORT=3005
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=notification-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - homebanking_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: homebanking_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api-gateway
    networks:
      - homebanking_network
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  homebanking_network:
    driver: bridge
