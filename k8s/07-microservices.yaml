apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: homebanking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
      - name: account-service
        image: your-registry.azurecr.io/account-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: homebanking-secrets
              key: DATABASE_URL
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317"
        - name: OTEL_SERVICE_NAME
          value: "account-service"
        envFrom:
        - configMapRef:
            name: homebanking-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: homebanking
spec:
  selector:
    app: account-service
  ports:
  - port: 3003
    targetPort: 3003
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: homebanking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      containers:
      - name: transaction-service
        image: your-registry.azurecr.io/transaction-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3004
        env:
        - name: SERVER_PORT
          value: "3004"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/homebanking_db"
        - name: SPRING_DATASOURCE_USERNAME
          value: "homebank"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: homebanking-secrets
              key: DB_PASSWORD
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317"
        - name: OTEL_SERVICE_NAME
          value: "transaction-service"
        envFrom:
        - configMapRef:
            name: homebanking-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "600m"
        livenessProbe:
          httpGet:
            path: /transactions/health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /transactions/health
            port: 3004
          initialDelaySeconds: 20
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: homebanking
spec:
  selector:
    app: transaction-service
  ports:
  - port: 3004
    targetPort: 3004
  type: ClusterIP

---
