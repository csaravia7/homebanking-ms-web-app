receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 10s
          static_configs:
            - targets: ['localhost:8888']

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  
  resource:
    attributes:
      - key: service.namespace
        value: homebanking
        action: upsert
      - key: deployment.environment
        value: development
        action: upsert

exporters:
  # ── Dynatrace via OTLP HTTP (trazas + métricas + logs) ──────────────────
  # Requiere: export DYNATRACE_ENVIRONMENT_ID=xxx DYNATRACE_API_TOKEN=yyy
  otlphttp/dynatrace:
    endpoint: "https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2/otlp"
    headers:
      Authorization: "Api-Token ${DYNATRACE_API_TOKEN}"
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s

  # ── Jaeger local (desarrollo) ───────────────────────────────────
  jaeger:
    endpoint: "jaeger:14250"
    tls:
      insecure: true

  # ── Prometheus local (desarrollo) ──────────────────────────────
  prometheus:
    endpoint: "0.0.0.0:8888"

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: :1777

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [otlphttp/dynatrace, jaeger]
    
    metrics:
      receivers:  [otlp, prometheus]
      processors: [memory_limiter, resource, batch]
      exporters:  [otlphttp/dynatrace, prometheus]
    
    logs:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [otlphttp/dynatrace, debug]
