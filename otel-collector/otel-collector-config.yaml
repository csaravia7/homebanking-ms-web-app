receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 10s
          static_configs:
            - targets: ['localhost:8888']

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  
  attributes:
    actions:
      - key: service.namespace
        value: homebanking
        action: insert
      - key: environment
        value: development
        action: insert

exporters:
  jaeger:
    endpoint: "jaeger:14250"
    tls:
      insecure: true
  
  prometheus:
    endpoint: "0.0.0.0:8888"
  
  otlp:
    client:
      endpoint: localhost:4317
      tls:
        insecure: true
  
  logging:
    loglevel: debug

extensions:
  health_check:
    endpoint: :13133
  
  pprof:
    endpoint: :1777

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [jaeger, logging]
    
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, attributes]
      exporters: [prometheus, logging]
    
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [logging]
