# ─────────────────────────────────────────────────────────────────────────────
#  Secrets
#
#  Before applying, base64-encode your real values:
#    echo -n 'mypassword' | base64
#
#  Or use kubectl directly (recommended for CI/CD):
#    kubectl -n homebanking create secret generic db-credentials \
#      --from-literal=POSTGRES_PASSWORD=<real_password> \
#      --from-literal=POSTGRES_USER=homebank \
#      --from-literal=POSTGRES_DB=homebanking_db
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: homebanking
  labels:
    app.kubernetes.io/part-of: homebanking
type: Opaque
stringData:
  # ⚠ Replace with real credentials before deploying to production
  POSTGRES_USER: homebank
  POSTGRES_PASSWORD: secure123
  POSTGRES_DB: homebanking_db
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: homebanking
  labels:
    app.kubernetes.io/part-of: homebanking
type: Opaque
stringData:
  # ⚠ Replace with a strong random secret (min 64 chars recommended)
  JWT_SECRET: "change-me-use-a-long-random-string-in-production-min-64-chars"
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: homebanking
  labels:
    app.kubernetes.io/part-of: homebanking
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: guest
  RABBITMQ_DEFAULT_PASS: guest
