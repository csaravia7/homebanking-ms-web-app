# Web Frontend — React / Vite build served by nginx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: homebanking
  labels:
    app: web-frontend
    app.kubernetes.io/part-of: homebanking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      containers:
      - name: web-frontend
        image: ${DOCKER_REGISTRY}/homebanking-web-frontend:${IMAGE_TAG}
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: homebanking
  labels:
    app: web-frontend
    app.kubernetes.io/part-of: homebanking
  annotations:
    # AKS: provisiona una Azure Public IP automáticamente
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/healthz"
spec:
  selector:
    app: web-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: LoadBalancer
