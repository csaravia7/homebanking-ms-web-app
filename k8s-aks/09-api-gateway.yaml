# API Gateway — Java / Spring Boot
# Entry point for all API traffic; routes to downstream services
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: homebanking
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: homebanking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        # OTel Operator: inyecta el agente Java automáticamente
        instrumentation.opentelemetry.io/inject-java: "homebanking/homebanking-instrumentation"
    spec:
      containers:
      - name: api-gateway
        image: ${DOCKER_REGISTRY}/homebanking-api-gateway:${IMAGE_TAG}
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:3001"
        - name: ACCOUNT_SERVICE_URL
          value: "http://account-service:3003"
        - name: TRANSACTION_SERVICE_URL
          value: "http://transaction-service:3004"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:3005"
        - name: OTEL_SERVICE_NAME
          value: "api-gateway"
        - name: OTEL_LOGS_EXPORTER
          value: "otlp"
        - name: OTEL_METRICS_EXPORTER
          value: "otlp"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: JAVA_OPTS
          value: "-Xms128m -Xmx384m -XX:+UseContainerSupport"
        envFrom:
        - configMapRef:
            name: otel-config
        resources:
          requests:
            cpu: "150m"
            memory: "256Mi"
          limits:
            cpu: "750m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 15
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: homebanking
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: homebanking
spec:
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP
