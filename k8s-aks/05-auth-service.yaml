# Auth Service — Node.js / SQLite
# NOTE: SQLite DB is stored in an emptyDir (persists during pod lifetime).
#       For production durability, migrate auth storage to PostgreSQL.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: homebanking
  labels:
    app: auth-service
    app.kubernetes.io/part-of: homebanking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        # OTel Operator: inyecta el SDK de Node.js automáticamente
        instrumentation.opentelemetry.io/inject-nodejs: "homebanking/homebanking-instrumentation"
    spec:
      containers:
      - name: auth-service
        image: ${DOCKER_REGISTRY}/homebanking-auth-service:${IMAGE_TAG}
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: NODE_ENV
          value: "production"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: JWT_SECRET
        volumeMounts:
        - name: sqlite-data
          mountPath: /app/data
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 20
          periodSeconds: 30
      volumes:
      - name: sqlite-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: homebanking
  labels:
    app: auth-service
    app.kubernetes.io/part-of: homebanking
spec:
  selector:
    app: auth-service
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
