# Account Service — Python / FastAPI / PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: homebanking
  labels:
    app: account-service
    app.kubernetes.io/part-of: homebanking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
      annotations:
        # OTel Operator: inyecta el SDK de Python automáticamente
        instrumentation.opentelemetry.io/inject-python: "homebanking/homebanking-instrumentation"
    spec:
      containers:
      - name: account-service
        image: ${DOCKER_REGISTRY}/homebanking-account-service:${IMAGE_TAG}
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: "postgresql+psycopg://homebank:$(POSTGRES_PASSWORD)@postgres:5432/homebanking_db"
        - name: OTEL_SERVICE_NAME
          value: "account-service"
        envFrom:
        - configMapRef:
            name: otel-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: homebanking
  labels:
    app: account-service
    app.kubernetes.io/part-of: homebanking
spec:
  selector:
    app: account-service
  ports:
  - port: 3003
    targetPort: 3003
  type: ClusterIP
