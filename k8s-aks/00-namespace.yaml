apiVersion: v1
kind: Namespace
metadata:
  name: homebanking
  labels:
    app.kubernetes.io/part-of: homebanking
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: homebanking
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "2"
      memory: "2Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: homebanking-quota
  namespace: homebanking
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 16Gi
    pods: "30"
