# ─────────────────────────────────────────────────────────────────────────────
#  RBAC para el OTel Collector
#
#  El processor k8sattributes necesita leer pods, namespaces y replicasets
#  de la API de Kubernetes para enriquecer la telemetría con metadata K8s.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: homebanking
  labels:
    app: otel-collector
    app.kubernetes.io/part-of: homebanking
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-k8s-reader
  labels:
    app: otel-collector
    app.kubernetes.io/part-of: homebanking
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-k8s-reader
  labels:
    app: otel-collector
    app.kubernetes.io/part-of: homebanking
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-k8s-reader
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: homebanking
