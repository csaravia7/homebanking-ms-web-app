# ─────────────────────────────────────────────────────────────────────────────
#  Dynatrace OpenTelemetry Collector
#
#  Antes de aplicar, configura las credenciales (o usa deploy-k8s.sh):
#    kubectl -n homebanking create secret generic dynatrace-credentials \
#      --from-literal=DYNATRACE_ENVIRONMENT_ID=<tu-env-id> \
#      --from-literal=DYNATRACE_API_TOKEN=<tu-api-token>
#
#  Scopes requeridos en el API Token:
#    openTelemetryTrace.ingest · metrics.ingest · logs.ingest
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: dynatrace-credentials
  namespace: homebanking
  labels:
    app: otel-collector
    app.kubernetes.io/part-of: homebanking
type: Opaque
stringData:
  # Valores inyectados por deploy-k8s.sh via envsubst
  DYNATRACE_ENVIRONMENT_ID: "${DYNATRACE_ENVIRONMENT_ID}"
  DYNATRACE_API_TOKEN: "${DYNATRACE_API_TOKEN}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: homebanking
  labels:
    app: otel-collector
    app.kubernetes.io/part-of: homebanking
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 512
        send_batch_max_size: 1024

      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100

      # ── Enriquecimiento K8s (ref: Dynatrace k8s-enrich guide) ─────────────
      # Extrae metadata del pod/namespace/deployment desde la API de K8s.
      # Requiere ServiceAccount con permisos de lectura (ver RBAC más abajo).
      k8sattributes:
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.job.name
            - k8s.cronjob.name
            - k8s.container.name
            - container.id
            - container.image.name
            - container.image.tag
          annotations:
            # Metadata inyectada por el Dynatrace Operator (OTel enrichment)
            - tag_name: metadata.dynatrace.com
              key: metadata.dynatrace.com
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      # ── Transform: mapeo workload + cluster para entidades Dynatrace ──────
      transform:
        error_mode: ignore
        trace_statements: &dynatrace_transformations
          - context: resource
            statements:
              # Cluster name (desde env var del Deployment)
              - set(attributes["k8s.cluster.name"], "${env:CLUSTER_NAME}")
              # Workload kind/name para que Dynatrace correlacione la entidad
              - set(attributes["k8s.workload.kind"], "job") where IsString(attributes["k8s.job.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.job.name"]) where IsString(attributes["k8s.job.name"])
              - set(attributes["k8s.workload.kind"], "cronjob") where IsString(attributes["k8s.cronjob.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.cronjob.name"]) where IsString(attributes["k8s.cronjob.name"])
              - set(attributes["k8s.workload.kind"], "daemonset") where IsString(attributes["k8s.daemonset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.daemonset.name"]) where IsString(attributes["k8s.daemonset.name"])
              - set(attributes["k8s.workload.kind"], "statefulset") where IsString(attributes["k8s.statefulset.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.statefulset.name"]) where IsString(attributes["k8s.statefulset.name"])
              - set(attributes["k8s.workload.kind"], "deployment") where IsString(attributes["k8s.deployment.name"])
              - set(attributes["k8s.workload.name"], attributes["k8s.deployment.name"]) where IsString(attributes["k8s.deployment.name"])
              # Parsear metadata del Dynatrace Operator si existe
              - merge_maps(attributes, ParseJSON(attributes["metadata.dynatrace.com"]), "upsert") where IsMatch(attributes["metadata.dynatrace.com"], "^\\{")
              - delete_key(attributes, "metadata.dynatrace.com")
        metric_statements: *dynatrace_transformations
        log_statements: *dynatrace_transformations

      # ── Atributos de entorno comunes ──────────────────────────────────────
      resource:
        attributes:
          - key: service.namespace
            value: homebanking
            action: upsert
          - key: deployment.environment
            value: production
            action: upsert
          - key: cloud.provider
            value: azure
            action: upsert

      # Convierte CUMULATIVE → DELTA (requerido por Dynatrace)
      cumulativetodelta:
        include:
          metrics:
            - ".*"
          match_type: regexp

      # Filtra Exponential Histograms (no soportados por Dynatrace)
      filter/dynatrace_compat:
        error_mode: ignore
        metrics:
          datapoint:
            - 'IsMatch(metric.name, ".*") and attributes["le"] == nil and metric.type == METRIC_DATA_TYPE_EXPONENTIAL_HISTOGRAM'

      # Filtra health-check spans
      filter/health:
        error_mode: ignore
        traces:
          span:
            - 'attributes["http.target"] == "/health"'
            - 'attributes["http.target"] == "/healthz"'

    exporters:
      otlphttp/dynatrace:
        endpoint: "https://${DYNATRACE_ENVIRONMENT_ID}.live.dynatrace.com/api/v2/otlp"
        compression: gzip
        timeout: 30s
        headers:
          Authorization: "Api-Token ${DYNATRACE_API_TOKEN}"
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 800

    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [k8sattributes, transform, memory_limiter, filter/health, resource, batch]
          exporters:  [otlphttp/dynatrace]
        metrics:
          receivers:  [otlp]
          processors: [k8sattributes, transform, memory_limiter, cumulativetodelta, filter/dynatrace_compat, resource, batch]
          exporters:  [otlphttp/dynatrace]
        logs:
          receivers:  [otlp]
          processors: [k8sattributes, transform, memory_limiter, resource, batch]
          exporters:  [otlphttp/dynatrace]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: homebanking
  labels:
    app: otel-collector
    app.kubernetes.io/part-of: homebanking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      # ✅ BP: non-root a nivel pod + seccomp
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # ServiceAccount con permisos de lectura de la API K8s (k8sattributes)
      serviceAccountName: otel-collector
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.102.0
        args:
          - "--config=/conf/otel-collector-config.yaml"
        ports:
        - name: otlp-grpc
          containerPort: 4317
          protocol: TCP
        - name: otlp-http
          containerPort: 4318
          protocol: TCP
        - name: health
          containerPort: 13133
          protocol: TCP
        env:
        # ✅ BP: Pod IP via Downward API
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        # Nombre del cluster AKS — aparece como k8s.cluster.name en Dynatrace
        - name: CLUSTER_NAME
          value: "homebanking-aks"
        - name: DYNATRACE_ENVIRONMENT_ID
          valueFrom:
            secretKeyRef:
              name: dynatrace-credentials
              key: DYNATRACE_ENVIRONMENT_ID
        - name: DYNATRACE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: dynatrace-credentials
              key: DYNATRACE_API_TOKEN
        volumeMounts:
        - name: otel-config
          mountPath: /conf
          readOnly: true
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # ✅ BP: contenedor sin privilegios
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        readinessProbe:
          httpGet:
            path: /
            port: 13133
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 13133
          initialDelaySeconds: 20
          periodSeconds: 30
      volumes:
      - name: otel-config
        configMap:
          name: otel-collector-config
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: homebanking
  labels:
    app: otel-collector
    app.kubernetes.io/part-of: homebanking
spec:
  selector:
    app: otel-collector
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
  - name: health
    port: 13133
    targetPort: 13133
    protocol: TCP
  type: ClusterIP
