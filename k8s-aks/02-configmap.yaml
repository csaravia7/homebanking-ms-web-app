apiVersion: v1
kind: ConfigMap
metadata:
  name: service-urls
  namespace: homebanking
  labels:
    app.kubernetes.io/part-of: homebanking
data:
  # Internal DNS names within the homebanking namespace
  AUTH_SERVICE_URL:         "http://auth-service:3001"
  ACCOUNT_SERVICE_URL:      "http://account-service:3003"
  TRANSACTION_SERVICE_URL:  "http://transaction-service:3004"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3005"

  # PostgreSQL connection
  DATABASE_URL: "postgresql+psycopg://homebank:$(POSTGRES_PASSWORD)@postgres:5432/homebanking_db"
  SPRING_DATASOURCE_URL:  "jdbc:postgresql://postgres:5432/homebanking_db"

  # RabbitMQ
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: homebanking
  labels:
    app.kubernetes.io/part-of: homebanking
data:
  # OTel Collector interno (K8s DNS: otel-collector.homebanking.svc.cluster.local)
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_SDK_DISABLED: "false"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "otlp"
  # Propaga contexto W3C (compatible con Dynatrace)
  OTEL_PROPAGATORS: "tracecontext,baggage"
