apiVersion: v1
kind: ConfigMap
metadata:
  name: service-urls
  namespace: homebanking
  labels:
    app.kubernetes.io/part-of: homebanking
data:
  # Internal DNS names within the homebanking namespace
  AUTH_SERVICE_URL:         "http://auth-service:3001"
  ACCOUNT_SERVICE_URL:      "http://account-service:3003"
  TRANSACTION_SERVICE_URL:  "http://transaction-service:3004"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3005"

  # PostgreSQL — la password se inyecta como env var en cada servicio que la necesite
  SPRING_DATASOURCE_URL:  "jdbc:postgresql://postgres:5432/homebanking_db"

  # RabbitMQ
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: homebanking
  labels:
    app.kubernetes.io/part-of: homebanking
data:
  # NOTA: OTEL_EXPORTER_OTLP_ENDPOINT / OTEL_EXPORTER_OTLP_PROTOCOL NO se definen
  # acá a propósito. La única fuente de verdad para endpoint+protocolo es el
  # Instrumentation CR (13-otel-instrumentation.yaml, puerto 4318 / http-protobuf,
  # el default de los SDKs de Java y Python). Definirlos acá en :4317/grpc además
  # del CR generaba pares endpoint/protocolo inconsistentes según qué servicio los
  # heredaba de dónde (algunos terminaban con grpc apuntando al puerto http, u
  # http/protobuf apuntando al puerto grpc) y las señales se perdían en silencio.
  OTEL_SDK_DISABLED: "false"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "otlp"
  # Propaga contexto W3C (compatible con Dynatrace) — redundante con el
  # Instrumentation CR pero no conflictivo (mismo valor en ambos lados).
  OTEL_PROPAGATORS: "tracecontext,baggage"
