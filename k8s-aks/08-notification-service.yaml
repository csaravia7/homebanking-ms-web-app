# Notification Service — Python / FastAPI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: homebanking
  labels:
    app: notification-service
    app.kubernetes.io/part-of: homebanking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        # OTel Operator: inyecta el SDK de Python automáticamente
        instrumentation.opentelemetry.io/inject-python: "homebanking/homebanking-instrumentation"
    spec:
      containers:
      - name: notification-service
        image: ${DOCKER_REGISTRY}/homebanking-notification-service:${IMAGE_TAG}
        ports:
        - containerPort: 3005
        env:
        - name: PORT
          value: "3005"
        - name: OTEL_SERVICE_NAME
          value: "notification-service"
        - name: RABBITMQ_HOST
          value: "rabbitmq"
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: rabbitmq-credentials
              key: RABBITMQ_DEFAULT_USER
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: rabbitmq-credentials
              key: RABBITMQ_DEFAULT_PASS
        envFrom:
        - configMapRef:
            name: otel-config
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 20
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: homebanking
  labels:
    app: notification-service
    app.kubernetes.io/part-of: homebanking
spec:
  selector:
    app: notification-service
  ports:
  - port: 3005
    targetPort: 3005
  type: ClusterIP
