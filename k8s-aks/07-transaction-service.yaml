# Transaction Service — Java / Spring Boot / PostgreSQL
# Spring Boot reads env vars as property overrides automatically:
#   SPRING_DATASOURCE_URL  →  spring.datasource.url
#   SPRING_DATASOURCE_USERNAME  →  spring.datasource.username
#   etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: homebanking
  labels:
    app: transaction-service
    app.kubernetes.io/part-of: homebanking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      containers:
      - name: transaction-service
        image: ${DOCKER_REGISTRY}/homebanking-transaction-service:${IMAGE_TAG}
        ports:
        - containerPort: 3004
        env:
        - name: SERVER_PORT
          value: "3004"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/homebanking_db"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_USER
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_PASSWORD
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"
        - name: OTEL_SERVICE_NAME
          value: "transaction-service"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317"
        - name: JAVA_OPTS
          value: "-Xms256m -Xmx512m -XX:+UseContainerSupport"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /transactions/health
            port: 3004
          initialDelaySeconds: 40
          periodSeconds: 15
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /transactions/health
            port: 3004
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: homebanking
  labels:
    app: transaction-service
    app.kubernetes.io/part-of: homebanking
spec:
  selector:
    app: transaction-service
  ports:
  - port: 3004
    targetPort: 3004
  type: ClusterIP
