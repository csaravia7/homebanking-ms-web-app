# ─────────────────────────────────────────────────────────────────────────────
#  HomeBanking — Nginx Reverse Proxy
#  Local:  routes to service hostnames via Docker network
#  AKS:    fronts all services behind a single ingress IP
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" ${request_time}s';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxies any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json
               application/javascript application/xml+rss image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m   rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=20r/s;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    # In Docker Compose / AKS, service names resolve via internal DNS
    upstream frontend    { server web-frontend:3008;      }
    upstream gateway     { server api-gateway:8080;       }
    upstream auth        { server auth-service:3001;      }
    upstream accounts    { server account-service:3003;   }
    upstream transactions{ server transaction-service:3004;}
    upstream notifications{ server notification-service:3005;}

    # ── Common proxy headers macro ────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Main server ───────────────────────────────────────────────────────────
    server {
        listen 80  default_server;
        listen [::]:80 default_server;
        server_name _;

        # Security headers
        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header X-XSS-Protection      "1; mode=block" always;
        add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

        # ── Static frontend (React SPA) ───────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── API Gateway (all /api/* requests) ────────────────────────────────
        location /api/ {
            limit_req zone=api burst=200 nodelay;
            proxy_pass         http://gateway/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
        }

        # ── Auth rate-limiting override ───────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=50 nodelay;
            proxy_pass         http://gateway/api/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health check (used by AKS liveness probe) ─────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── Deny dotfiles ─────────────────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
        }
    }
}
