spring.application.name=transaction-service
server.port=3004

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/homebanking_db
spring.datasource.username=homebank
spring.datasource.password=secure123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# OpenTelemetry
otel.sdk.disabled=false
otel.exporter.otlp.endpoint=http://localhost:4317
otel.service.name=transaction-service
otel.traces.exporter=otlp
otel.metrics.exporter=otlp

# Logging
logging.level.root=INFO
logging.level.com.homebanking=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
