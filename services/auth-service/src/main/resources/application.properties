spring.application.name=auth-service
server.port=${PORT:3001}

# SQLite storage — same file-based engine as the previous better-sqlite3 implementation
auth.db.path=${AUTH_DB_PATH:/app/data/auth.db}

# JWT
jwt.secret=${JWT_SECRET:your-secret-key}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}

# OpenTelemetry
otel.sdk.disabled=false
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.service.name=${OTEL_SERVICE_NAME:auth-service}
otel.traces.exporter=otlp
otel.metrics.exporter=otlp
otel.logs.exporter=otlp

# Logging (see log4j2.xml for appender/pattern configuration)
logging.level.root=INFO
logging.level.com.homebanking=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
