spring.application.name=api-gateway
server.port=${PORT:8080}

# Downstream service URLs
service.auth-url=${AUTH_SERVICE_URL:http://localhost:3001}
service.account-url=${ACCOUNT_SERVICE_URL:http://localhost:3003}
service.transaction-url=${TRANSACTION_SERVICE_URL:http://localhost:3004}
service.notification-url=${NOTIFICATION_SERVICE_URL:http://localhost:3005}

# OpenTelemetry
otel.sdk.disabled=false
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.service.name=${OTEL_SERVICE_NAME:api-gateway}
otel.traces.exporter=otlp
otel.metrics.exporter=otlp
otel.logs.exporter=otlp

# Logging (see log4j2.xml for appender/pattern configuration)
logging.level.root=INFO
logging.level.com.homebanking=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
